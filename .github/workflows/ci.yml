# GitHub Actions - LogvanceWMS Frontend CI
# main ve develop push/PR'da build ve lint çalıştırır.
# Deploy için Azure DevOps pipeline kullanılır: https://dev.azure.com/Logvancewms/YeniWMS/_build

name: CI

on:
  push:
    branches: [main, master, develop, dev]
    paths:
      - 'frontend/**'
      - 'frontend-admin/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master, develop, dev]
    paths:
      - 'frontend/**'
      - 'frontend-admin/**'
      - '.github/workflows/**'

jobs:
  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

  admin:
    name: Angular Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build -- --configuration=production
